services:
  bellmark:
    image: ghcr.io/context-management/bellmark:1.0.2
    build: .
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    environment:
      - BELLMARK_SECRET_KEY=${BELLMARK_SECRET_KEY:?Set BELLMARK_SECRET_KEY in .env}
      - BELLMARK_API_KEY=${BELLMARK_API_KEY:-}
      - BELLMARK_DEV_MODE=${BELLMARK_DEV_MODE:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - MISTRAL_API_KEY=${MISTRAL_API_KEY:-}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - GROK_API_KEY=${GROK_API_KEY:-}
      - GLM_API_KEY=${GLM_API_KEY:-}
      - KIMI_API_KEY=${KIMI_API_KEY:-}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS-__BELLMARK_DEFAULT_CORS__}
      - BELLMARK_HOST=0.0.0.0
      - BACKEND_PORT=8000
      - BELLMARK_DB_PATH=/app/data/bellmark.db
    volumes:
      - bellmark-data:/app/data
      # For NAS/backup-friendly setups, replace the named volume above with:
      # - ./data:/app/data
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health/live')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

volumes:
  bellmark-data:
    driver: local
