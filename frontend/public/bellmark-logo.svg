<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bellGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="checkGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4ade80;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#22c55e;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Bell shape -->
  <path d="M50 8 C30 8 18 25 18 42 L18 58 C18 62 15 66 12 68 L12 72 L88 72 L88 68 C85 66 82 62 82 58 L82 42 C82 25 70 8 50 8 Z"
        fill="url(#bellGradient)" />

  <!-- Bell clapper/bottom -->
  <ellipse cx="50" cy="78" rx="12" ry="6" fill="url(#bellGradient)" />

  <!-- Neural network nodes inside bell -->
  <circle cx="50" cy="30" r="4" fill="#1f2937" opacity="0.6"/>
  <circle cx="35" cy="45" r="3" fill="#1f2937" opacity="0.5"/>
  <circle cx="65" cy="45" r="3" fill="#1f2937" opacity="0.5"/>
  <circle cx="40" cy="58" r="2.5" fill="#1f2937" opacity="0.4"/>
  <circle cx="60" cy="58" r="2.5" fill="#1f2937" opacity="0.4"/>

  <!-- Neural connections -->
  <line x1="50" y1="30" x2="35" y2="45" stroke="#1f2937" stroke-width="1.5" opacity="0.3"/>
  <line x1="50" y1="30" x2="65" y2="45" stroke="#1f2937" stroke-width="1.5" opacity="0.3"/>
  <line x1="35" y1="45" x2="40" y2="58" stroke="#1f2937" stroke-width="1.5" opacity="0.3"/>
  <line x1="65" y1="45" x2="60" y2="58" stroke="#1f2937" stroke-width="1.5" opacity="0.3"/>
  <line x1="35" y1="45" x2="60" y2="58" stroke="#1f2937" stroke-width="1.5" opacity="0.2"/>
  <line x1="65" y1="45" x2="40" y2="58" stroke="#1f2937" stroke-width="1.5" opacity="0.2"/>

  <!-- Checkmark overlay -->
  <path d="M30 50 L45 65 L75 32"
        fill="none"
        stroke="url(#checkGradient)"
        stroke-width="6"
        stroke-linecap="round"
        stroke-linejoin="round"
        opacity="0.9"/>
</svg>